name: 'Install Dashboards with Plugin via Binary'

on: [push, pull_request]
env:
  CI: 1
  # avoid warnings like "tput: No value for $TERM and no -T specified"
  TERM: xterm
  PLUGIN_NAME: opensearch-security
  OPENSEARCH_INITIAL_ADMIN_PASSWORD: myStrongPassword123!

jobs:
  verify-binary-installation:
    name: Run binary installation
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # TODO: add windows support when OSD core is stable on windows
    runs-on: ${{ matrix.os }}
    steps:  
      - name: Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set env
        run: |
          opensearch_version=$(node -p "require('./package.json').opensearchDashboards.version")
          plugin_version=$(node -p "require('./package.json').version")
          echo "OPENSEARCH_VERSION=$opensearch_version" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=$plugin_version" >> $GITHUB_ENV
        shell: bash

      - name: Download security plugin and create setup scripts
        uses: ./.github/actions/download-plugin
        with:
          opensearch-version: ${{ env.OPENSEARCH_VERSION }}
          plugin-name: ${{ env.PLUGIN_NAME }}
          plugin-version: ${{ env.PLUGIN_VERSION }}
          download-location: ${{ env.PLUGIN_NAME }}

      - name: Run Opensearch with security
        uses: opensearch-project/opensearch-build/.github/actions/start-opensearch@58029ed0db12929e8e920eb875925335583f9490
        with:
          opensearch-version: ${{ env.OPENSEARCH_VERSION }}
          plugins: "file:$(pwd)/${{ env.PLUGIN_NAME }}.zip"
          security-enabled: true
          admin-password: ${{ env.OPENSEARCH_INITIAL_ADMIN_PASSWORD }}
          jdk-version: 21

      # Configure the Dashboard
      - name: Configure OpenSearch Dashboards
        run: |
          cat << 'EOT' > opensearch-dashboards-config.yml
          server.host: "0.0.0.0"
          opensearch.hosts: ["https://localhost:9200"]
          opensearch.ssl.verificationMode: none
          opensearch.username: "kibanaserver"
          opensearch.password: "kibanaserver"
          opensearch.requestHeadersWhitelist: [ authorization,securitytenant ]
          opensearch_security.multitenancy.enabled: true
          opensearch_security.multitenancy.tenants.preferred: ["Private", "Global"]
          opensearch_security.readonly_mode.roles: ["kibana_read_only"]

          # Use this setting if you are running opensearch-dashboards without https
          opensearch_security.cookie.secure: false
          EOT


      - name: Setup and build plugin
        id: setup-dashboards
        uses: opensearch-project/opensearch-build/.github/actions/setup-opensearch-dashboards@72a7a8a167ed06d83ba65b4d9f60acd08232cd56
        with:
          plugin_name: security-dashboards-plugin

      - name: Build plugin zip
        run: yarn build
        working-directory: ${{ steps.setup-dashboards.outputs.plugin-directory }}

      - name: Download OpenSearch Dashboards binary
        run: |
          OSD_VERSION=$(jq -r '.opensearchDashboards.version' package.json)
          curl -L -o opensearch-dashboards.tar.gz "https://ci.opensearch.org/ci/dbc/snapshots/core/opensearch-dashboards/${OSD_VERSION}-SNAPSHOT/opensearch-dashboards-min-${OSD_VERSION}-SNAPSHOT-linux-x64-latest.tar.gz"
          tar -xzf opensearch-dashboards.tar.gz
          rm opensearch-dashboards.tar.gz
          echo "DASHBOARDS_DIR=$(ls -d opensearch-dashboards-*)" >> $GITHUB_ENV
        working-directory: ${{ steps.setup-dashboards.outputs.plugin-directory }}
        shell: bash

      - name: Install plugin into binary
        run: |
          PLUGIN_ZIP=$(ls ${{ steps.setup-dashboards.outputs.plugin-directory }}/build/security-dashboards-*.zip)
          ./${DASHBOARDS_DIR}/bin/opensearch-dashboards-plugin install "file:${PLUGIN_ZIP}"
        working-directory: ${{ steps.setup-dashboards.outputs.plugin-directory }}
        shell: bash

      - name: Configure and start OpenSearch Dashboards
        run: |
          cp ${{ github.workspace }}/opensearch-dashboards-config.yml ./${DASHBOARDS_DIR}/config/opensearch_dashboards.yml
          nohup ./${DASHBOARDS_DIR}/bin/opensearch-dashboards &
        working-directory: ${{ steps.setup-dashboards.outputs.plugin-directory }}
        shell: bash

      - name: Health check
        run: |
          timeout 300 bash -c 'while [[ "$(curl -u admin:${{ env.OPENSEARCH_INITIAL_ADMIN_PASSWORD }} -k http://localhost:5601/api/status | jq -r '.status.overall.state')" != "green" ]]; do sleep 5; done'
        shell: bash
